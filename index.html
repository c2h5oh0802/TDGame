<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔王守衛戰：流派覺醒</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
      }

      #gameContainer {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0a0a0a;
      }

      #gameCanvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* HUD overlays */
      #hudContainer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .hud-panel {
        position: absolute;
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #4a9eff;
        padding: 12px;
        font-size: 14px;
        color: #fff;
        font-family: monospace;
      }

      #statsPanel {
        top: 10px;
        left: 10px;
        min-width: 200px;
      }

      #wavePanel {
        top: 10px;
        right: 10px;
        min-width: 150px;
      }

      #gameOverScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 1000;
        pointer-events: auto;
      }

      #gameOverScreen.show {
        display: flex;
      }

      .game-over-content {
        text-align: center;
        color: #fff;
      }

      .game-over-content h1 {
        font-size: 48px;
        margin-bottom: 20px;
        color: #ff4444;
      }

      .game-over-content p {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .game-over-content button {
        margin-top: 30px;
        padding: 12px 24px;
        font-size: 16px;
        background-color: #4a9eff;
        color: #fff;
        border: none;
        cursor: pointer;
        pointer-events: auto;
      }

      .game-over-content button:hover {
        background-color: #2a7eef;
      }

      #pauseMenu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.95);
        border: 3px solid #4a9eff;
        padding: 30px;
        display: none;
        z-index: 999;
        text-align: center;
        pointer-events: auto;
        min-width: 300px;
      }

      #pauseMenu.show {
        display: block;
      }

      #pauseMenu h2 {
        color: #4a9eff;
        margin-bottom: 20px;
        font-size: 32px;
      }

      #pauseMenu p {
        color: #fff;
        margin-bottom: 15px;
        font-size: 16px;
      }

      #upgradeMenu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.95);
        border: 3px solid #4a9eff;
        padding: 30px;
        display: none;
        z-index: 998;
        max-width: 800px;
        max-height: 90vh;
        overflow-y: auto;
        pointer-events: auto;
      }

      #upgradeMenu.show {
        display: block;
      }

      #upgradeMenu h2 {
        color: #4a9eff;
        margin-bottom: 20px;
        font-size: 24px;
        text-align: center;
      }

      .upgrade-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
      }

      .upgrade-card {
        background: rgba(20, 20, 40, 0.9);
        border: 2px solid #4a9eff;
        padding: 15px;
        cursor: pointer;
        transition: all 0.2s;
        color: #fff;
        pointer-events: auto;
      }

      .upgrade-card:hover {
        background: rgba(40, 40, 80, 0.9);
        border-color: #ffaa00;
        transform: scale(1.05);
      }

      .upgrade-card h3 {
        color: #ffaa00;
        margin-bottom: 8px;
      }

      .upgrade-card p {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 8px;
      }

      /* Loading indicator */
      #loadingScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        z-index: 2000;
      }

      #loadingScreen.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <canvas id="gameCanvas"></canvas>
      <div id="hudContainer">
        <div id="statsPanel" class="hud-panel">
          <div id="playerStats"></div>
          <div id="coreHealth"></div>
          <div id="resources"></div>
        </div>
        <div id="wavePanel" class="hud-panel">
          <div id="waveInfo"></div>
          <div id="enemyCount"></div>
        </div>
      </div>
      <div id="pauseMenu">
        <h2>暫停</h2>
        <p>按 ESC 繼續遊戲</p>
      </div>
      <div id="upgradeMenu">
        <h2>選擇升級</h2>
        <div class="upgrade-cards" id="upgradeCards"></div>
      </div>
      <div id="gameOverScreen">
        <div class="game-over-content">
          <h1 id="gameOverTitle">遊戲結束</h1>
          <p id="gameOverMessage"></p>
          <button id="restartButton">重新開始</button>
        </div>
      </div>
      <div id="loadingScreen">
        <p>正在初始化遊戲...</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
